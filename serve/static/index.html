<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Qwen3-TTS streaming chat</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0e0f12;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 16px 24px;
      border-bottom: 1px solid #1f2229;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { margin: 0; font-size: 16px; font-weight: 600; }
    .status { font-size: 12px; color: #888; }
    .status.ok { color: #6cdc8c; }
    .status.err { color: #ff7878; }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px 24px;
      gap: 12px;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 8px 0;
    }
    .msg {
      padding: 10px 14px;
      border-radius: 12px;
      max-width: 90%;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .msg.user { align-self: flex-end; background: #2c54a8; }
    .msg.assistant { align-self: flex-start; background: #1f2229; }
    .msg.assistant .phrases { color: #6cdc8c; font-size: 12px; margin-top: 6px; opacity: 0.7; }
    form {
      display: flex;
      gap: 8px;
      padding-top: 8px;
      border-top: 1px solid #1f2229;
    }
    textarea {
      flex: 1;
      min-height: 56px;
      max-height: 200px;
      resize: vertical;
      padding: 10px 12px;
      background: #1a1c22;
      color: #e8e8e8;
      border: 1px solid #262932;
      border-radius: 8px;
      font: inherit;
    }
    button {
      padding: 0 18px;
      background: #2c54a8;
      color: white;
      border: 0;
      border-radius: 8px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { background: #2a2d35; color: #666; cursor: not-allowed; }
    .reset { background: #2a2d35; }
  </style>
</head>
<body>
  <header>
    <h1>Qwen3-TTS streaming chat</h1>
    <span class="status" id="status">connecting…</span>
  </header>
  <main>
    <div class="messages" id="messages"></div>
    <form id="form">
      <textarea id="input" placeholder="Say something… (Enter to send, Shift+Enter for newline)" autofocus></textarea>
      <button id="send" type="submit">Send</button>
      <button id="reset" type="button" class="reset" title="Clear chat history">Reset</button>
    </form>
  </main>
  <script type="module" src="/static/app.js"></script>
</body>
</html>
